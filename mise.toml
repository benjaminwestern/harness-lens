[tools]
go = "latest"
hk = "latest"
pkl = "latest"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = { version = "latest" }
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = { version = "latest" }
"go:mvdan.cc/gofumpt" = { version = "latest" }

[tasks."mise:validate"]
description = "Validate the local mise task configuration"
run = "mise tasks ls --local >/dev/null"

[tasks."sqlc:generate"]
description = "Regenerate database access code from db/queries and db/schema.sql"
run = "sqlc generate"

[tasks."sqlc:check"]
description = "Regenerate sqlc output and fail if checked-in generated files drift"
run = "git diff --quiet -- db && sqlc generate && git diff --exit-code -- db"

[tasks."go:build"]
description = "Build the local Harness Lens binary"
run = "go build -o harness-lens ."

[tasks.build]
description = "Build the local Harness Lens binary"
depends = ["go:build"]
run = "true"


[tasks."go:vet"]
description = "Run go vet"
run = "go vet ./..."

[tasks."go:fmt"]
description = "Apply Go formatters defined in .golangci.yaml"
run = "golangci-lint fmt"

[tasks."go:fmt:check"]
description = "Check Go formatting against .golangci.yaml"
run = "golangci-lint fmt --diff"

[tasks."go:lint"]
description = "Run golangci-lint using .golangci.yaml"
run = "golangci-lint run"

[tasks."web:smoke"]
description = "Smoke-check that the local dashboard starts and serves core routes"
run = """
tmpdir=$(mktemp -d)
logfile="$tmpdir/harness-lens.log"
port=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')
trap 'kill "$pid" 2>/dev/null || true; wait "$pid" 2>/dev/null || true; rm -rf "$tmpdir"' EXIT
go build -o "$tmpdir/harness-lens" .
PORT="$port" HOST=127.0.0.1 "$tmpdir/harness-lens" >"$logfile" 2>&1 &
pid=$!
for _ in $(seq 1 80); do
  if curl -fsS "http://127.0.0.1:$port/" >"$tmpdir/home.html" 2>/dev/null; then
    break
  fi
  sleep 0.25
done
grep -q "Harness Lens" "$tmpdir/home.html"
curl -fsS "http://127.0.0.1:$port/dictionary-template" -o "$tmpdir/dictionary.csv"
head -1 "$tmpdir/dictionary.csv" | grep -q "word,severity,group"
"""

[tasks."check:repo:mise"]
description = "Validate the local mise configuration"
depends = ["mise:validate"]
run = "true"

[tasks."check:repo:hk"]
description = "Validate the hk configuration"
depends = ["hk:validate"]
run = "true"

[tasks."check:quick"]
description = "Run the fast local verification suite"
run = """
mise run check:repo:mise
mise run check:repo:hk
mise run sqlc:check
mise run go:fmt:check
mise run go:lint
mise run go:vet
mise run web:smoke
"""

[tasks.check]
description = "Run the main local verification suite"
depends = ["check:quick"]
run = "true"

[tasks."check:ci"]
description = "Run the local CI-equivalent verification suite"
depends = ["check"]
run = "true"

[tasks."hk:validate"]
description = "Validate the hk configuration"
run = "hk validate"

[tasks."hk:check"]
description = "Run the default hk check profile"
run = "hk check"

[tasks."hk:check:all"]
description = "Run hk checks against the full tracked workspace"
run = "hk check --all"

[tasks."hk:fix"]
description = "Run the default hk fix profile"
run = "hk fix"

[tasks."hk:fix:all"]
description = "Run hk fixes against the full tracked workspace"
run = "hk fix --all"

[tasks."hk:pre-commit"]
description = "Run the hk pre-commit hook locally"
run = "hk run pre-commit"

[tasks."hk:pre-push"]
description = "Run the hk pre-push hook locally"
run = "hk run pre-push"


[tasks."hk:install"]
description = "Install hk git hooks for this repository"
run = "HK_MISE=1 hk install --mise"
